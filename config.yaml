router_settings:

  routing_strategy: simple-shuffle

  model_group_alias:
    coder: coder-tier1

  num_retries: 0

  max_fallbacks: 3

  timeout: 600

  retry_after: 2

  fallbacks:

    - coder:
        - coder-tier2

    - coder-tier1:
        - coder-tier2

    - coder-tier2:
        - coder-tier3

    - coder-tier3:
        - coder-tier1
