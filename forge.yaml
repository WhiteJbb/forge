# Forge 설정 — 단일 소스 (스키마: forge_gateway/settings.py, 설계: DESIGN.md §5.9)
version: 1

server:
  host: 127.0.0.1          # 외부 바인딩은 명시 설정 + FORGE_API_KEY 필수
  port: 4000

auth:
  api_key_env: FORGE_API_KEY

# auto_providers: true(기본값, 아래 명시 안 해도 적용) — 여기 없는 provider라도
# 카탈로그(settings.py의 PROVIDER_CATALOG: openrouter/groq/mistral/deepseek/openai/
# anthropic/ollama)에 있고 대응하는 API 키가 .env/환경변수에 있으면 부팅 시 자동
# 등록되어 모델까지 discovery된다. 아래처럼 forge.yaml에 명시한 provider가 항상 우선.
# 자동 등록을 끄려면: auto_providers: false
providers:
  - name: nvidia
    litellm_prefix: openai
    api_base: https://integrate.api.nvidia.com/v1
    api_key_env: NVIDIA_API_KEY
    discovery: true
    free: true               # 무료 티어 — 소속 전 모델 가격 (0,0)
    rpm: 40                  # 실측 한도 (2026-07 확인)
    max_concurrent: 8

# capability/tier 오버라이드 — discovery 결과에 병합. 미지정 값은 defaults 적용.
# capability 시드: 2026-07-09 공개 벤치마크 기반 (근거·출처: docs/Research.md "벤치마크 시드").
# 주 신호: SWE-bench Verified/Pro(에이전트 코딩), LiveCodeBench(오염 저항). 자료 없는
# 모델은 기존 추정 유지로 표기. context_window는 NVIDIA 서빙 한도 미확인이라 미설정
# (초과 시 상향 failover가 자가 보정, §7).
models:
  - id: "nvidia:z-ai/glm-5.2"     # SWE-Pro 62.1% 오픈 1위, 1M ctx
    tier: tier1
    capabilities: { code: 10, debug: 10, refactor: 10, docs: 8, context: 10, speed: 8 }
  - id: "nvidia:deepseek-ai/deepseek-v4-pro"   # LiveCodeBench 93.5 선두급
    tier: tier1
    capabilities: { code: 10, debug: 10, refactor: 9, docs: 8, context: 10, speed: 8 }
  - id: "nvidia:qwen/qwen3.5-397b-a17b"        # SWE-V 76.2% / SWE-Pro 50.9%
    tier: tier1
    capabilities: { code: 9, debug: 8, refactor: 9, docs: 10, context: 10, speed: 8 }
  - id: "nvidia:mistralai/mistral-large-3-675b-instruct-2512"  # 2026-07 자료 미확인 — 기존 추정 유지
    tier: tier2
    capabilities: { code: 8, debug: 8, refactor: 8, docs: 9, context: 9, speed: 8 }
  - id: "nvidia:nvidia/nemotron-3-ultra-550b-a55b"  # BenchLM 종합 오픈 상위권
    tier: tier2
    capabilities: { code: 9, debug: 8, refactor: 8, docs: 8, context: 9, speed: 7 }
  - id: "nvidia:mistralai/mistral-medium-3.5-128b"  # SWE-V 77.6% (Devstral 2 능가), 256K ctx
    tier: tier2
    capabilities: { code: 9, debug: 8, refactor: 8, docs: 8, context: 9, speed: 9 }
  - id: "nvidia:deepseek-ai/deepseek-v4-flash"      # SWE-V ~78%
    tier: tier2
    capabilities: { code: 9, debug: 8, refactor: 8, docs: 7, context: 8, speed: 10 }
  - id: "nvidia:nvidia/nemotron-3-super-120b-a12b"  # LCB 81.2 / SWE-V 60.5%
    tier: tier2
    capabilities: { code: 7, debug: 7, refactor: 7, docs: 7, context: 7, speed: 9 }
  - id: "nvidia:gpt-oss-120b"     # LCB 88.0 강 / SWE-Multilingual 30.8% 약 — 에이전트 작업 하향
    tier: tier2
    capabilities: { code: 8, debug: 7, refactor: 7, docs: 8, context: 8, speed: 9 }
  - id: "nvidia:mistralai/mistral-small-4-119b-2603"  # 자료 미확인 — 기존 추정 유지
    tier: tier3
    capabilities: { code: 6, debug: 6, refactor: 6, docs: 7, context: 6, speed: 10 }
  - id: "nvidia:nvidia/llama-3.3-nemotron-super-49b-v1.5"  # 자료 미확인 — 기존 추정 유지
    tier: tier3
    capabilities: { code: 6, debug: 6, refactor: 6, docs: 7, context: 7, speed: 9 }
  - id: "nvidia:minimaxai/minimax-m3"  # SWE-Pro 59.0% — tier3 저평가였음, tier2 승격
    tier: tier2
    capabilities: { code: 9, debug: 9, refactor: 8, docs: 7, context: 8, speed: 8 }

defaults:
  capability: 7
  tier: tier3
  features: [tools, streaming]   # discovery 모델 기본값

scheduler:
  cooldown_seconds: 300
  max_failures_before_cooldown: 3
  max_attempts: 4
  latency_ewma_alpha: 0.3
  session_affinity: true
  session_ttl_minutes: 30

timeouts:
  connect: 5
  ttft: 30
  total_deadline: 600

metrics:
  db_path: forge.db
  retention_days: 30

health:
  probe_idle_minutes: 5
  probe_timeout: 10

analyzer:
  llm_fallback: false

tuner:                               # capability 학습 루프 (§5.11-3)
  enabled: true
  interval_minutes: 30
  window_days: 3
  min_samples: 5
  demote_failure_rate: 0.5

# 정책 라우팅 (§5.4) — 위에서부터 first-match. 마지막 정책이 기본 라우팅.
# when 없는 정책은 constraints 전용(항상 적용). 예:
#   - name: free-only
#     constraints: { allow_paid: false }
policies:
  # 신호 기반 자동 계층화 (2026-07-09 실측: glm/qwen TTFT 180s+, nemotron 2.8s,
  # mistral-small 0.4s, v4-flash 8.6s, v4-pro 18s — docs/Research.md 벤치 참조)
  # 큰 작업은 컨텍스트 누적(3만 토큰↑)이나 debug task로 자동 판별 — 수동 전환 불필요.
  - name: heavy-work
    when: { min_prompt_tokens: 30000 }
    route:
      prefer: [ "nvidia:deepseek-ai/deepseek-v4-pro" ]   # 대형 중 유일하게 응답성 있음
      fallback: [ tier1, tier2, tier3 ]
  - name: hard-tasks
    when: { task: [debug] }
    route:
      prefer: [ "nvidia:deepseek-ai/deepseek-v4-pro" ]
      fallback: [ tier1, tier2, tier3 ]
  - name: default
    when: {}
    route:
      prefer: [ "nvidia:nvidia/nemotron-3-super-120b-a12b",
                "nvidia:deepseek-ai/deepseek-v4-flash",
                "nvidia:mistralai/mistral-small-4-119b-2603" ]
      fallback: [ tier2, tier1, tier3 ]
