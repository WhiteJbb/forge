<title>Forge Dashboard</title>
<style>
  /* ===== Design tokens (dark control-panel theme) ===== */
  :root {
    /* surfaces & ink (dataviz dark ramp) */
    --bg:          #0d0d0d;
    --surface:     #1a1a19;
    --surface-2:   #222220;
    --border:      rgba(255, 255, 255, 0.10);
    --border-2:    rgba(255, 255, 255, 0.06);
    --text-1:      #ffffff;
    --text-2:      #c3c2b7;
    --muted:       #898781;
    --grid:        #2c2c2a;
    --axis:        #383835;

    /* status palette (fixed, never themed) */
    --good:        #0ca30c;
    --warning:     #fab219;
    --serious:     #ec835a;
    --critical:    #d03b3b;
    --unknown:     #6b6a66;

    /* series */
    --series-req:  #3987e5;  /* requests / bars  */
    --series-lat:  #d95926;  /* latency / line   */

    /* spacing scale (4px base) */
    --sp-1: 4px;
    --sp-2: 8px;
    --sp-3: 12px;
    --sp-4: 16px;
    --sp-5: 24px;
    --sp-6: 32px;

    --radius:   8px;
    --radius-s: 5px;

    --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", "Consolas", monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text-1);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: var(--sp-5) var(--sp-5) var(--sp-6);
  }

  /* ===== Disconnect banner ===== */
  .banner {
    display: none;
    align-items: center;
    gap: var(--sp-3);
    background: rgba(208, 59, 59, 0.14);
    border: 1px solid var(--critical);
    color: #f4c6c6;
    padding: var(--sp-3) var(--sp-4);
    border-radius: var(--radius);
    margin-bottom: var(--sp-4);
    font-size: 13px;
  }
  .banner.show { display: flex; }
  .banner strong { color: #ffdddd; }
  .banner button {
    margin-left: auto;
    background: var(--critical);
    color: #fff;
    border: none;
    padding: var(--sp-1) var(--sp-3);
    border-radius: var(--radius-s);
    font: inherit;
    font-size: 12px;
    cursor: pointer;
  }
  .banner button:hover { filter: brightness(1.1); }

  /* ===== Header ===== */
  header.top {
    display: flex;
    align-items: baseline;
    gap: var(--sp-4);
    padding-bottom: var(--sp-4);
    margin-bottom: var(--sp-5);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .logo .spark { color: var(--series-lat); }
  .logo-sub {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .conn {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: var(--sp-2);
    font-size: 12px;
    color: var(--text-2);
  }
  .conn .dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--muted);
  }
  .conn.ok  .dot { background: var(--good); box-shadow: 0 0 6px rgba(12,163,12,0.7); }
  .conn.bad .dot { background: var(--critical); box-shadow: 0 0 6px rgba(208,59,59,0.7); }
  .conn .updated { color: var(--muted); }

  /* ===== Section scaffold ===== */
  section { margin-bottom: var(--sp-6); }
  .sec-head {
    display: flex;
    align-items: baseline;
    gap: var(--sp-3);
    margin-bottom: var(--sp-3);
  }
  .sec-head h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--text-2);
    margin: 0;
  }
  .sec-head .note { font-size: 12px; color: var(--muted); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  /* ===== Stat tiles ===== */
  .tiles {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: var(--sp-3);
  }
  .tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: var(--sp-4);
  }
  .tile .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
    margin-bottom: var(--sp-2);
  }
  .tile .value {
    font-size: 26px;
    font-weight: 650;
    color: var(--text-1);
    line-height: 1.1;
  }
  .tile .value .unit { font-size: 14px; color: var(--muted); font-weight: 500; }
  .tile .sub { margin-top: var(--sp-1); font-size: 12px; color: var(--text-2); }

  /* ===== Tier boards ===== */
  .tier-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--sp-3);
  }
  .tier-card { padding: var(--sp-3) var(--sp-3) var(--sp-2); }
  .tier-card > h3 {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-2);
    margin: 0 0 var(--sp-2);
    display: flex;
    align-items: center;
    gap: var(--sp-2);
  }
  .tier-card > h3 .count {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: right;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    padding: var(--sp-1) var(--sp-1);
    border-bottom: 1px solid var(--border);
  }
  th.l, td.l { text-align: left; }
  td {
    padding: var(--sp-2) var(--sp-1);
    border-bottom: 1px solid var(--border-2);
    font-variant-numeric: tabular-nums;
    text-align: right;
    color: var(--text-2);
    white-space: nowrap;
  }
  tr:last-child td { border-bottom: none; }
  td.model {
    color: var(--text-1);
    font-family: var(--mono);
    font-size: 12px;
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  td.model .prov {
    display: block;
    font-family: var(--font);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .empty-row td {
    text-align: center;
    color: var(--muted);
    font-style: italic;
    padding: var(--sp-4);
  }

  /* status pill */
  .st {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-2);
  }
  .st .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .st-healthy  .dot { background: var(--good); }
  .st-unknown  .dot { background: var(--unknown); }
  .st-cooldown .dot { background: var(--warning); }
  .st-unhealthy .dot { background: var(--critical); }
  .st-cooldown { color: var(--warning); font-variant-numeric: tabular-nums; }
  .st-unhealthy { color: var(--critical); }

  .rate-good { color: var(--good); }
  .rate-warn { color: var(--warning); }
  .rate-bad  { color: var(--critical); }
  .dim { color: var(--muted); }

  /* ===== Throttle gauges ===== */
  .throttle-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: var(--sp-3);
  }
  .thr {
    padding: var(--sp-3) var(--sp-4);
  }
  .thr .name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-1);
    margin-bottom: var(--sp-3);
    font-family: var(--mono);
  }
  .thr .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 3px;
  }
  .thr .row .v { color: var(--text-2); font-variant-numeric: tabular-nums; }
  .bar {
    height: 7px;
    background: var(--surface-2);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: var(--sp-3);
  }
  .bar > span {
    display: block;
    height: 100%;
    border-radius: 4px;
    background: var(--series-req);
    transition: width 0.4s ease;
  }
  .bar.warn > span { background: var(--warning); }
  .bar.crit > span { background: var(--critical); }
  .bar.conc > span { background: var(--series-lat); }
  .thr .unlimited { font-size: 11px; color: var(--muted); font-style: italic; }

  /* ===== Trend chart ===== */
  .chart-card { padding: var(--sp-4) var(--sp-4) var(--sp-3); position: relative; }
  .legend {
    display: flex;
    gap: var(--sp-4);
    margin-bottom: var(--sp-2);
    font-size: 11px;
    color: var(--text-2);
  }
  .legend .key { display: flex; align-items: center; gap: 6px; }
  .legend .swatch { width: 12px; height: 3px; border-radius: 2px; }
  .legend .swatch.bar { height: 10px; width: 10px; border-radius: 2px; }
  svg.chart { width: 100%; height: auto; display: block; overflow: visible; }
  .chart-tip {
    position: absolute;
    pointer-events: none;
    background: #000;
    border: 1px solid var(--border);
    border-radius: var(--radius-s);
    padding: 6px 9px;
    font-size: 11px;
    color: var(--text-1);
    line-height: 1.5;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.1s;
    z-index: 5;
    font-variant-numeric: tabular-nums;
  }
  .chart-tip .k { color: var(--muted); }
  .chart-tip b.req { color: var(--series-req); }
  .chart-tip b.lat { color: var(--series-lat); }

  /* ===== Policies ===== */
  .badges { display: flex; flex-wrap: wrap; gap: var(--sp-2); }
  .badge {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 5px var(--sp-3);
    font-size: 12px;
    color: var(--text-2);
    font-family: var(--mono);
  }
  .badge::before {
    content: "";
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--series-req);
    margin-right: 7px;
    vertical-align: middle;
  }

  .loading { color: var(--muted); font-size: 13px; padding: var(--sp-4); }

  @media (max-width: 900px) {
    .tiles { grid-template-columns: repeat(2, 1fr); }
    .tier-grid { grid-template-columns: 1fr; }
  }
</style>

<div class="wrap">

  <div id="banner" class="banner">
    <span>&#9888;</span>
    <span><strong>Server disconnected.</strong> Retrying automatically&hellip;</span>
    <button id="retryBtn" type="button">Retry now</button>
  </div>

  <header class="top">
    <div>
      <div class="logo">For<span class="spark">g</span>e</div>
    </div>
    <div class="logo-sub">AI Gateway</div>
    <div id="conn" class="conn">
      <span class="dot"></span>
      <span id="connText">Connecting&hellip;</span>
      <span class="updated" id="updated"></span>
    </div>
  </header>

  <!-- 2. Today summary tiles -->
  <section>
    <div class="sec-head"><h2>Today</h2><span class="note" id="todayDate"></span></div>
    <div class="tiles" id="tiles">
      <div class="loading">Loading&hellip;</div>
    </div>
  </section>

  <!-- 3. Tier model status boards -->
  <section>
    <div class="sec-head"><h2>Model Status</h2><span class="note">by tier</span></div>
    <div class="tier-grid" id="tiers">
      <div class="loading">Loading&hellip;</div>
    </div>
  </section>

  <!-- 4. Throttle gauges -->
  <section>
    <div class="sec-head"><h2>Throttle</h2><span class="note">per provider</span></div>
    <div class="throttle-grid" id="throttle">
      <div class="loading">Loading&hellip;</div>
    </div>
  </section>

  <!-- 5. 7-day trend -->
  <section>
    <div class="sec-head"><h2>7-Day Trend</h2><span class="note" id="trendNote"></span></div>
    <div class="card chart-card">
      <div class="legend">
        <span class="key"><span class="swatch bar" style="background:var(--series-req)"></span>Requests</span>
        <span class="key"><span class="swatch" style="background:var(--series-lat)"></span>Avg latency (ms)</span>
      </div>
      <div id="chart"><div class="loading">Loading&hellip;</div></div>
      <div class="chart-tip" id="chartTip"></div>
    </div>
  </section>

  <!-- 6. Policies -->
  <section>
    <div class="sec-head"><h2>Policies</h2></div>
    <div class="badges" id="policies">
      <div class="loading">Loading&hellip;</div>
    </div>
  </section>

</div>

<script>
"use strict";

/* ============================================================
 * Forge Dashboard — self-contained SPA.
 * Data sources (same origin):
 *   GET /dashboard        polled every 3s
 *   GET /v1/stats?days=7  polled every 30s
 * All rendering is driven from these two payloads only.
 * ============================================================ */

const DASH_INTERVAL  = 3000;
const STATS_INTERVAL = 30000;

// Last successful payloads + the wall-clock time they arrived,
// so cooldown countdowns can tick down between polls.
let dashData = null;
let dashTime = 0;      // ms epoch of last /dashboard fetch
let statsData = null;
let connected = false;

const $ = (id) => document.getElementById(id);

/* ---------- formatting helpers ---------- */

function fmtInt(n) {
  if (n == null || isNaN(n)) return "0";
  return Math.round(n).toLocaleString("en-US");
}

function fmtTokens(n) {
  n = n || 0;
  if (n >= 1e9) return (n / 1e9).toFixed(2) + "B";
  if (n >= 1e6) return (n / 1e6).toFixed(2) + "M";
  if (n >= 1e3) return (n / 1e3).toFixed(1) + "k";
  return String(Math.round(n));
}

function fmtCost(n) {
  n = n || 0;
  if (n === 0) return "$0.00";
  if (n < 0.01) return "$" + n.toFixed(4);
  return "$" + n.toFixed(2);
}

function fmtLatency(ms) {
  if (!ms || ms <= 0) return "&mdash;";
  if (ms >= 1000) return (ms / 1000).toFixed(2) + "s";
  return Math.round(ms) + "ms";
}

function fmtPct(x, digits) {
  if (x == null) return "&mdash;";
  return x.toFixed(digits == null ? 1 : digits) + "%";
}

// "provider:some/long-model-id" -> short display name (part after first colon)
function shortModel(id) {
  const i = id.indexOf(":");
  const tail = i >= 0 ? id.slice(i + 1) : id;
  return tail;
}

function esc(s) {
  return String(s).replace(/[&<>"]/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

/* ---------- connection state ---------- */

function setConnected(ok) {
  connected = ok;
  const conn = $("conn");
  conn.classList.toggle("ok", ok);
  conn.classList.toggle("bad", !ok);
  $("connText").textContent = ok ? "Connected" : "Disconnected";
  $("banner").classList.toggle("show", !ok);
}

function setUpdated(ts) {
  const d = new Date(ts);
  const hh = String(d.getHours()).padStart(2, "0");
  const mm = String(d.getMinutes()).padStart(2, "0");
  const ss = String(d.getSeconds()).padStart(2, "0");
  $("updated").textContent = "· updated " + hh + ":" + mm + ":" + ss;
}

/* ---------- data fetching ---------- */

async function fetchDashboard() {
  try {
    const r = await fetch("/dashboard", { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    dashData = await r.json();
    dashTime = Date.now();
    setConnected(true);
    setUpdated(dashTime);
    renderDashboard();
  } catch (e) {
    setConnected(false);
  }
}

async function fetchStats() {
  try {
    const r = await fetch("/v1/stats?days=7", { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    statsData = await r.json();
    renderChart();
  } catch (e) {
    // /dashboard poll owns the connection banner; a stats miss is non-fatal.
  }
}

/* ---------- rendering: dashboard sections ---------- */

// Cooldown seconds remaining, decayed by time since the payload arrived.
function liveCooldown(base) {
  const elapsed = Math.floor((Date.now() - dashTime) / 1000);
  return Math.max(0, (base || 0) - elapsed);
}

function allModels(d) {
  const tiers = d.tiers || {};
  return ["tier1", "tier2", "tier3"].reduce(
    (acc, t) => acc.concat(tiers[t] || []), []);
}

function renderDashboard() {
  if (!dashData) return;
  renderTiles(dashData);
  renderTiers(dashData);
  renderThrottle(dashData);
  renderPolicies(dashData);
}

function renderTiles(d) {
  const today = d.today || {};
  const models = allModels(d);
  const healthy = models.filter((m) => m.status === "healthy").length;
  const totalModels = d.total_models != null ? d.total_models : models.length;
  const tokens = (today.models || []).reduce((s, m) => s + (m.tokens || 0), 0);

  const tiles = [
    { label: "Requests", value: fmtInt(today.total_requests),
      sub: fmtInt(today.total_success) + " ok · " + fmtInt(today.total_failures) + " fail" },
    { label: "Success Rate",
      value: (today.total_requests ? today.success_rate.toFixed(1) : "—"),
      unit: today.total_requests ? "%" : "",
      sub: "failure " + fmtPct(today.failure_rate) },
    { label: "Total Tokens", value: fmtTokens(tokens), sub: "prompt + completion" },
    { label: "Cost", value: fmtCost(today.total_cost), sub: "today, USD" },
    { label: "Healthy Models", value: String(healthy),
      unit: " / " + totalModels, sub: "reporting healthy" },
  ];

  $("tiles").innerHTML = tiles.map((t) =>
    '<div class="tile">' +
      '<div class="label">' + t.label + '</div>' +
      '<div class="value">' + t.value +
        (t.unit ? '<span class="unit">' + esc(t.unit) + '</span>' : '') +
      '</div>' +
      '<div class="sub">' + t.sub + '</div>' +
    '</div>').join("");

  $("todayDate").textContent = today.date ? "(" + today.date + " UTC)" : "";
}

function statusCell(m) {
  const s = m.status;
  if (s === "cooldown") {
    const rem = liveCooldown(m.cooldown_remaining);
    return '<span class="st st-cooldown"><span class="dot"></span>cooldown ' + rem + 's</span>';
  }
  const label = { healthy: "healthy", unknown: "unknown", unhealthy: "unhealthy" }[s] || esc(s);
  return '<span class="st st-' + esc(s) + '"><span class="dot"></span>' + label + '</span>';
}

function rateCell(r) {
  if (r == null) return '<span class="dim">&mdash;</span>';
  const pct = (r * 100);
  let cls = "rate-good";
  if (pct < 70) cls = "rate-bad";
  else if (pct < 90) cls = "rate-warn";
  return '<span class="' + cls + '">' + pct.toFixed(0) + '%</span>';
}

function modelRow(m) {
  return '<tr>' +
    '<td class="l model" title="' + esc(m.id) + '">' + esc(shortModel(m.id)) +
      '<span class="prov">' + esc(m.provider) +
        (m.source === "discovered" ? ' · disc' : '') + '</span></td>' +
    '<td class="l">' + statusCell(m) + '</td>' +
    '<td>' + fmtLatency(m.latency_ms) + '</td>' +
    '<td>' + rateCell(m.success_rate_window) + '</td>' +
    '<td>' + fmtInt(m.total_requests) + '</td>' +
  '</tr>';
}

function renderTiers(d) {
  const tiers = d.tiers || {};
  const order = ["tier1", "tier2", "tier3"];
  const html = order.map((t) => {
    const models = tiers[t] || [];
    const rows = models.length
      ? models.map(modelRow).join("")
      : '<tr class="empty-row"><td colspan="5">no models</td></tr>';
    return '<div class="card tier-card">' +
      '<h3>' + t.toUpperCase() + '<span class="count">' + models.length + ' models</span></h3>' +
      '<table><thead><tr>' +
        '<th class="l">Model</th><th class="l">Status</th>' +
        '<th>Lat</th><th>Succ</th><th>Reqs</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table>' +
    '</div>';
  }).join("");
  $("tiers").innerHTML = html;
}

function renderThrottle(d) {
  const thr = d.throttle || {};
  const names = Object.keys(thr);
  if (!names.length) {
    $("throttle").innerHTML = '<div class="loading">No throttle data.</div>';
    return;
  }
  const html = names.map((name) => {
    const t = thr[name];
    const rpm = t.rpm;
    const rem = t.tokens_remaining;
    let tokenBlock;
    if (rpm == null || rpm <= 0) {
      tokenBlock = '<div class="row"><span>RPM budget</span>' +
        '<span class="unlimited">unlimited</span></div>' +
        '<div class="bar"><span style="width:0"></span></div>';
    } else {
      const pct = Math.max(0, Math.min(100, ((rem || 0) / rpm) * 100));
      let cls = "";
      if (pct < 15) cls = "crit";
      else if (pct < 40) cls = "warn";
      tokenBlock = '<div class="row"><span>RPM tokens</span>' +
        '<span class="v">' + fmtInt(rem) + ' / ' + fmtInt(rpm) + '</span></div>' +
        '<div class="bar ' + cls + '"><span style="width:' + pct.toFixed(1) + '%"></span></div>';
    }

    const maxc = t.max_concurrent;
    const inflight = t.in_flight || 0;
    let concBlock;
    if (maxc == null || maxc <= 0) {
      concBlock = '<div class="row"><span>In-flight</span>' +
        '<span class="v">' + inflight + ' <span class="dim">/ &infin;</span></span></div>' +
        '<div class="bar conc"><span style="width:0"></span></div>';
    } else {
      const cpct = Math.max(0, Math.min(100, (inflight / maxc) * 100));
      concBlock = '<div class="row"><span>Concurrency</span>' +
        '<span class="v">' + inflight + ' / ' + maxc + '</span></div>' +
        '<div class="bar conc"><span style="width:' + cpct.toFixed(1) + '%"></span></div>';
    }

    return '<div class="card thr">' +
      '<div class="name">' + esc(name) + '</div>' +
      tokenBlock + concBlock +
    '</div>';
  }).join("");
  $("throttle").innerHTML = html;
}

function renderPolicies(d) {
  const pols = d.policies || [];
  if (!pols.length) {
    $("policies").innerHTML = '<span class="badge">no policies</span>';
    return;
  }
  $("policies").innerHTML = pols.map((p) =>
    '<span class="badge">' + esc(p) + '</span>').join("");
}

/* ---------- rendering: 7-day trend (hand-rolled SVG) ---------- */

// Build an ordered day series ending at stats.today.date, aggregating the
// per-model rows in stats.summary[date] into (requests, avgLatency) per day.
function buildTrend(stats) {
  const days = stats.days || 7;
  const summary = stats.summary || {};
  const anchorStr = (stats.today && stats.today.date) ||
    new Date().toISOString().slice(0, 10);
  const anchor = new Date(anchorStr + "T00:00:00Z");

  const series = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(anchor.getTime());
    d.setUTCDate(d.getUTCDate() - i);
    const key = d.toISOString().slice(0, 10);
    const rows = summary[key] || [];
    let req = 0, sumLat = 0;
    for (const row of rows) {
      req += row.total_requests || 0;
      sumLat += row.sum_latency_ms || 0;
    }
    const avgLat = req > 0 ? sumLat / req : 0;
    series.push({ date: key, requests: req, avgLat: avgLat });
  }
  return series;
}

function renderChart() {
  if (!statsData) return;
  const series = buildTrend(statsData);
  $("trendNote").textContent = "(" + series.length + " days, UTC)";

  // geometry (SVG user units; scales responsively via viewBox)
  const W = 760, H = 260;
  const M = { top: 16, right: 48, bottom: 34, left: 46 };
  const plotW = W - M.left - M.right;
  const plotH = H - M.top - M.bottom;

  const maxReq = Math.max(1, ...series.map((s) => s.requests));
  const maxLat = Math.max(1, ...series.map((s) => s.avgLat));

  const n = series.length;
  const slot = plotW / n;
  const barW = Math.min(46, slot * 0.55);

  const xCenter = (i) => M.left + slot * i + slot / 2;
  const yReq = (v) => M.top + plotH - (v / maxReq) * plotH;
  const yLat = (v) => M.top + plotH - (v / maxLat) * plotH;

  const parts = [];

  // gridlines + left (requests) axis ticks
  const ticks = 4;
  for (let g = 0; g <= ticks; g++) {
    const y = M.top + plotH - (plotH * g) / ticks;
    parts.push('<line x1="' + M.left + '" y1="' + y + '" x2="' + (W - M.right) +
      '" y2="' + y + '" stroke="var(--grid)" stroke-width="1"/>');
    const reqVal = Math.round((maxReq * g) / ticks);
    parts.push('<text x="' + (M.left - 8) + '" y="' + (y + 3) +
      '" fill="var(--muted)" font-size="10" text-anchor="end">' + fmtInt(reqVal) + '</text>');
    const latVal = Math.round((maxLat * g) / ticks);
    parts.push('<text x="' + (W - M.right + 8) + '" y="' + (y + 3) +
      '" fill="var(--series-lat)" font-size="10" text-anchor="start">' + fmtInt(latVal) + '</text>');
  }

  // axis titles
  parts.push('<text x="' + M.left + '" y="' + (M.top - 4) +
    '" fill="var(--muted)" font-size="9" text-anchor="start">requests</text>');
  parts.push('<text x="' + (W - M.right) + '" y="' + (M.top - 4) +
    '" fill="var(--series-lat)" font-size="9" text-anchor="end">ms</text>');

  // request bars (rounded top, anchored to baseline)
  for (let i = 0; i < n; i++) {
    const s = series[i];
    const x = xCenter(i) - barW / 2;
    const y = yReq(s.requests);
    const h = M.top + plotH - y;
    if (s.requests > 0 && h > 0) {
      parts.push('<rect x="' + x.toFixed(1) + '" y="' + y.toFixed(1) +
        '" width="' + barW.toFixed(1) + '" height="' + h.toFixed(1) +
        '" rx="3" fill="var(--series-req)"/>');
    }
  }

  // latency line + markers
  const pts = series.map((s, i) => xCenter(i).toFixed(1) + "," + yLat(s.avgLat).toFixed(1));
  parts.push('<polyline points="' + pts.join(" ") +
    '" fill="none" stroke="var(--series-lat)" stroke-width="2" ' +
    'stroke-linejoin="round" stroke-linecap="round"/>');
  for (let i = 0; i < n; i++) {
    const s = series[i];
    parts.push('<circle cx="' + xCenter(i).toFixed(1) + '" cy="' + yLat(s.avgLat).toFixed(1) +
      '" r="3" fill="var(--series-lat)" stroke="var(--surface)" stroke-width="1.5"/>');
  }

  // x-axis date labels (MM-DD)
  for (let i = 0; i < n; i++) {
    const label = series[i].date.slice(5);
    parts.push('<text x="' + xCenter(i).toFixed(1) + '" y="' + (H - 12) +
      '" fill="var(--muted)" font-size="10" text-anchor="middle">' + label + '</text>');
  }

  // transparent hover columns (full height) for tooltips
  for (let i = 0; i < n; i++) {
    const x = M.left + slot * i;
    parts.push('<rect class="hovercol" data-i="' + i +
      '" x="' + x.toFixed(1) + '" y="' + M.top + '" width="' + slot.toFixed(1) +
      '" height="' + plotH + '" fill="transparent"/>');
  }

  const svg = '<svg class="chart" viewBox="0 0 ' + W + ' ' + H +
    '" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Requests and average latency over ' +
    n + ' days">' + parts.join("") + '</svg>';
  $("chart").innerHTML = svg;

  wireChartHover(series);
}

function wireChartHover(series) {
  const tip = $("chartTip");
  const svg = $("chart").querySelector("svg");
  if (!svg) return;
  const cols = svg.querySelectorAll(".hovercol");
  const container = $("chart").parentElement; // .chart-card (position: relative)

  cols.forEach((col) => {
    col.addEventListener("mousemove", (ev) => {
      const i = +col.getAttribute("data-i");
      const s = series[i];
      tip.innerHTML =
        '<div>' + s.date + '</div>' +
        '<div><span class="k">req</span> <b class="req">' + fmtInt(s.requests) + '</b></div>' +
        '<div><span class="k">avg</span> <b class="lat">' +
          (s.avgLat > 0 ? Math.round(s.avgLat) + ' ms' : '—') + '</b></div>';
      const rect = container.getBoundingClientRect();
      let x = ev.clientX - rect.left + 12;
      let y = ev.clientY - rect.top + 12;
      if (x > rect.width - 110) x = ev.clientX - rect.left - 110;
      tip.style.left = x + "px";
      tip.style.top = y + "px";
      tip.style.opacity = "1";
    });
    col.addEventListener("mouseleave", () => { tip.style.opacity = "0"; });
  });
}

/* ---------- ticker: keep cooldown countdowns live between polls ---------- */

function tick() {
  // Re-render only the status boards so cooldown timers decrement smoothly
  // without waiting for the next /dashboard poll.
  if (dashData && connected) {
    const hasCooldown = allModels(dashData).some((m) => m.status === "cooldown");
    if (hasCooldown) renderTiers(dashData);
  }
}

/* ---------- boot ---------- */

$("retryBtn").addEventListener("click", () => { fetchDashboard(); fetchStats(); });

fetchDashboard();
fetchStats();
setInterval(fetchDashboard, DASH_INTERVAL);
setInterval(fetchStats, STATS_INTERVAL);
setInterval(tick, 1000);
</script>
